name: Release Firmware

on:
  push:
    branches: [main]
    paths:
      - 'fw-rp2040/**'
      - '.github/workflows/release-firmware.yml'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Pico SDK dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/google-chrome*
          sudo apt-get update -qq
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential

      - name: Clone Pico SDK
        run: |
          git clone --depth 1 --branch 2.1.1 https://github.com/raspberrypi/pico-sdk.git /opt/pico-sdk
          cd /opt/pico-sdk
          git submodule update --init lib/tinyusb

      - name: Static check
        run: bash fw-rp2040/check.sh

      - name: Build firmware
        run: |
          mkdir -p fw-rp2040/build
          cd fw-rp2040/build
          export PICO_SDK_PATH=/opt/pico-sdk
          cmake .. -DPICO_BOARD=pico
          make -j$(nproc)

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: fw-rp2040/build/*.uf2
          name: firmware-v0.02
          tag_name: v0.02
          body: |
            NS Auto Painter RP2040 v0.02

            - 移除: LittleFS 日志系统
          token: ${{ secrets.GITHUB_TOKEN }}
